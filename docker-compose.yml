version: "3.9"

services:
  backend:
    build:
      context: ./personel_backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./personel_backend:/app          # hot reload in dev
    environment:
      - DEBUG=1
      - SECRET_KEY=change-me-in-production
      - ALLOWED_HOSTS=*
    command: python manage.py runserver 0.0.0.0:8000

  frontend:
    build:
      context: ./personel_frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./personel_frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000   # inside Docker, backend is available at this host
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
